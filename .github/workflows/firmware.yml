name: Firmware

on:
  push:
    tags:
      - 'firmware-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  list-boards:
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set-matrix.outputs.boards }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          boards=$(python3 scripts/registry.py list | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  build:
    needs: list-boards
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJson(needs.list-boards.outputs.boards) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools and Arduino toolchain
        run: |
          pip install esptool
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"
          export PATH="$PWD/bin:$PATH"
          arduino-cli config init
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "ArduinoJson" "WiFiManager" "TFT_eSPI" "U8g2"

      - name: Build ${{ matrix.board }}
        env:
          SKIP_DEPS: "1"
        run: |
          chmod +x scripts/*.sh
          bash scripts/build-firmware.sh "${{ matrix.board }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            firmware/dist/${{ matrix.board }}/*-merged-flash.bin
            firmware/dist/${{ matrix.board }}/manifest.json
            firmware/dist/${{ matrix.board }}/FLASH.txt

  release:
    if: startsWith(github.ref, 'refs/tags/firmware-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: firmware-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
